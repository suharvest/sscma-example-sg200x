<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Analysis Debugger - ReCamera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        h1 {
            font-size: 1.5rem;
            color: #4cc9f0;
        }

        .status-indicator {
            display: flex;
            gap: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f72585;
        }

        .status-dot.connected {
            background: #4cc9f0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .video-container {
            position: relative;
            background: #0f0f1a;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .video-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
        }

        .panel-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #7b2cbf;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .config-group {
            margin-bottom: 12px;
        }

        .config-group label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .config-group input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0f0f1a;
            color: #eee;
            font-size: 0.9rem;
        }

        .config-group input:focus {
            outline: none;
            border-color: #4cc9f0;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4cc9f0;
            color: #0f0f1a;
        }

        .btn-primary:hover {
            background: #3ab8df;
        }

        .btn-danger {
            background: #f72585;
            color: white;
        }

        .btn-danger:hover {
            background: #e01e75;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            background: #0f0f1a;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4cc9f0;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 3px;
        }

        .face-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .face-card {
            background: #0f0f1a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #4cc9f0;
        }

        .face-card:last-child {
            margin-bottom: 0;
        }

        .face-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .face-id {
            font-weight: bold;
            color: #4cc9f0;
        }

        .face-confidence {
            color: #888;
            font-size: 0.85rem;
        }

        .face-attrs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 0.85rem;
        }

        .attr-item {
            display: flex;
            justify-content: space-between;
        }

        .attr-label {
            color: #888;
        }

        .attr-value {
            color: #eee;
        }

        .emotion-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .emotion-fill {
            height: 100%;
            background: linear-gradient(90deg, #4cc9f0, #7b2cbf);
            transition: width 0.3s;
        }

        .log-container {
            max-height: 200px;
            overflow-y: auto;
            background: #0f0f1a;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.75rem;
        }

        .log-entry {
            margin-bottom: 4px;
            color: #888;
        }

        .log-entry.info { color: #4cc9f0; }
        .log-entry.error { color: #f72585; }
        .log-entry.success { color: #4ade80; }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Face Analysis Debugger</h1>
            <div class="status-indicator">
                <div class="status-item">
                    <span class="status-dot" id="mqttStatus"></span>
                    <span>MQTT</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="videoStatus"></span>
                    <span>Video</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="video-container">
                <video id="videoElement" autoplay muted playsinline></video>
                <canvas id="overlayCanvas"></canvas>
                <div class="video-placeholder" id="videoPlaceholder">
                    <p>Enter RTSP URL and click Connect</p>
                    <p style="font-size: 0.8rem; margin-top: 5px;">rtsp://192.168.42.1:554/live</p>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-title">Connection</div>
                    <div class="config-group">
                        <label>MQTT WebSocket URL</label>
                        <input type="text" id="mqttUrl" value="ws://192.168.42.1:9001" placeholder="ws://host:port">
                    </div>
                    <div class="config-group">
                        <label>MQTT Topic</label>
                        <input type="text" id="mqttTopic" value="recamera/face-analysis/results">
                    </div>
                    <div class="config-group">
                        <label>RTSP URL (WebRTC Proxy)</label>
                        <input type="text" id="rtspUrl" value="http://192.168.42.1:8889/live" placeholder="http://host:port/stream">
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="connectBtn" onclick="connect()">Connect</button>
                        <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">Statistics</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="faceCount">0</div>
                            <div class="stat-label">Faces</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="fps">0</div>
                            <div class="stat-label">FPS</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="inferenceTime">0</div>
                            <div class="stat-label">Inference (ms)</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="frameId">0</div>
                            <div class="stat-label">Frame</div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">Detected Faces</div>
                    <div class="face-list" id="faceList">
                        <div style="color: #666; text-align: center; padding: 20px;">
                            No faces detected
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">Log</div>
                    <div class="log-container" id="logContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
