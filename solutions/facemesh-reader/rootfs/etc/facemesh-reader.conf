# FaceMesh Reader Configuration
# ReCamera FaceMesh (468-point MediaPipe) → EAR / MAR drowsiness metrics

# Model paths
FACE_MODEL=/userdata/local/models/yolo-face_mixfp16.cvimodel
FACEMESH_MODEL=/userdata/local/models/face_landmark_cv181x_bf16.cvimodel

# Detection threshold (0.0 - 1.0)
FACE_THRESHOLD=0.4

# MQTT configuration
MQTT_HOST=localhost
MQTT_PORT=1883
MQTT_TOPIC=recamera/facemesh-reader/results

# Include all 468 landmarks per face in MQTT JSON (large payload, off by default)
INCLUDE_LANDMARKS=0

# Video streaming
RTSP_ENABLED=1
STREAM_WIDTH=1280
STREAM_HEIGHT=720
STREAM_FPS=15

# Inference settings
INFERENCE_WIDTH=640
INFERENCE_HEIGHT=480
INFERENCE_FPS=10

# Logging
VERBOSE=0
