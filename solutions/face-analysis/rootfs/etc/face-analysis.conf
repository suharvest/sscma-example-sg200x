# Face Analysis Configuration
# ReCamera Face Analysis Application

# Model paths
# Face detector: yolov8n-face INT8 (community jalonso/yolov8face). Requires the
# 3 sscma-micro YoloV8 multi-output bug fixes (PRs at Seeed-Studio/SSCMA-Micro).
FACE_MODEL=/userdata/local/models/yolov8n_face_cv181x_int8.cvimodel
# Age/Gender/Race: FairFace ResNet34 INT8 (Stanford). Bin-classification →
# tolerates loose bbox crops, no face alignment needed. Replaces InsightFace
# genderage (which was confirmed broken — always output ~35yo regardless of input).
GENDERAGE_MODEL=/userdata/local/models/fairface_int8.cvimodel
EMOTION_MODEL=/userdata/local/models/enet_b0_8_best_afew_cv181x_bf16.cvimodel

# Run emotion every N frames (1 = every frame, 2 = every 2 frames, ...)
EMOTION_INTERVAL=2

# Detection threshold (0.0 - 1.0)
FACE_THRESHOLD=0.5

# MQTT configuration
MQTT_HOST=localhost
MQTT_PORT=1883
MQTT_TOPIC=recamera/face-analysis/results

# Face blur (cover detected faces on RTSP stream)
BLUR_ENABLED=0
MAX_REGIONS=12

# Video streaming
RTSP_ENABLED=1
STREAM_WIDTH=1280
STREAM_HEIGHT=720
STREAM_FPS=15

# Inference settings
INFERENCE_WIDTH=640
INFERENCE_HEIGHT=480
INFERENCE_FPS=10

# Logging
VERBOSE=0
