# Face Analysis Configuration
# ReCamera Face Analysis Application
# Supports both InsightFace (genderage) and FairFace (age_gender_race) models

# Model paths
FACE_MODEL=/userdata/local/models/yolo-face_mixfp16.cvimodel
GENDERAGE_MODEL=/userdata/local/models/genderage_int8.cvimodel
EMOTION_MODEL=/userdata/local/models/enet_b0_8_best_afew_cv181x_bf16.cvimodel

# Run emotion every N frames (1 = every frame, 2 = every 2 frames, ...)
EMOTION_INTERVAL=2

# Detection threshold (0.0 - 1.0)
FACE_THRESHOLD=0.5

# MQTT configuration
MQTT_HOST=localhost
MQTT_PORT=1883
MQTT_TOPIC=recamera/face-analysis/results

# Face blur (cover detected faces on RTSP stream)
BLUR_ENABLED=0
MAX_REGIONS=12

# Video streaming
RTSP_ENABLED=1
STREAM_WIDTH=1280
STREAM_HEIGHT=720
STREAM_FPS=15

# Inference settings
INFERENCE_WIDTH=640
INFERENCE_HEIGHT=480
INFERENCE_FPS=10

# Logging
VERBOSE=0
