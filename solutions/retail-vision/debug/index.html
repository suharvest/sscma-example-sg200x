<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retail Vision Debug</title>
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e0e0;
    --dim: #888;
    --green: #8CC63F;
    --blue: #4a9eff;
    --yellow: #f5c842;
    --orange: #f5a623;
    --red: #f55050;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
  }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Toolbar rows */
  .toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .toolbar label { color: var(--dim); font-size: 11px; }
  .toolbar input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px;
    width: 140px;
  }
  .toolbar input.narrow { width: 50px; }
  .toolbar input.topic { width: 220px; }
  .toolbar input.rtsp-url { width: 360px; }
  .toolbar button {
    padding: 5px 14px; border: none; border-radius: 4px;
    font-family: inherit; font-size: 12px; cursor: pointer;
    background: var(--green); color: #111; font-weight: 600;
  }
  .toolbar button:hover { opacity: 0.9; }
  .toolbar button.disconnect { background: var(--red); color: #fff; }
  .toolbar button.secondary { background: var(--blue); color: #fff; }
  .toolbar button.secondary.disconnect { background: var(--red); }
  .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 2px;
  }
  .status-dot.off { background: #555; }
  .status-dot.on { background: var(--green); }
  .status-group { display: flex; align-items: center; gap: 2px; font-size: 11px; color: var(--dim); }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Video + canvas area */
  .canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #000; position: relative; overflow: hidden;
  }
  .video-container {
    position: relative;
    max-width: 100%; max-height: 100%;
    aspect-ratio: 16 / 9;
  }
  .video-container img {
    display: block;
    width: 100%; height: 100%;
    object-fit: fill;
    background: #111;
  }
  .video-container canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .canvas-stats {
    position: absolute; top: 8px; left: 8px;
    font-size: 11px; color: var(--dim);
    display: flex; gap: 12px;
    background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px;
  }
  .canvas-stats span.val { color: var(--green); }
  .no-video {
    display: flex; align-items: center; justify-content: center;
    width: 1280px; height: 720px; max-width: 100%; max-height: 100%;
    background: #111; color: var(--dim); font-size: 14px;
  }

  /* Side panel */
  .side {
    width: 320px; flex-shrink: 0;
    background: var(--panel); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px;
  }
  .card h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--dim); margin-bottom: 8px;
  }
  .metric-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4px 12px;
  }
  .metric { display: flex; justify-content: space-between; }
  .metric .label { color: var(--dim); }
  .metric .value { color: var(--text); font-weight: 600; }
  .metric .value.highlight { color: var(--green); }

  /* Person list */
  .person-item {
    padding: 8px; border-radius: 4px;
    margin-bottom: 6px; border-left: 3px solid;
  }
  .person-item.transient { border-color: var(--blue); background: rgba(74,158,255,0.08); }
  .person-item.dwelling { border-color: var(--yellow); background: rgba(245,200,66,0.08); }
  .person-item.engaged { border-color: var(--orange); background: rgba(245,166,35,0.08); }
  .person-item.assistance { border-color: var(--red); background: rgba(245,80,80,0.08); }
  .person-header {
    display: flex; justify-content: space-between; margin-bottom: 4px;
  }
  .person-header .id { font-weight: 700; }
  .person-header .state {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 1px 6px; border-radius: 3px; font-weight: 600;
  }
  .state-transient { background: rgba(74,158,255,0.2); color: var(--blue); }
  .state-dwelling { background: rgba(245,200,66,0.2); color: var(--yellow); }
  .state-engaged { background: rgba(245,166,35,0.2); color: var(--orange); }
  .state-assistance { background: rgba(245,80,80,0.2); color: var(--red); }
  .person-detail { color: var(--dim); font-size: 11px; line-height: 1.6; }
  .person-detail b { color: var(--text); font-weight: 500; }

  /* JSON panel */
  .json-panel {
    max-height: 200px; overflow-y: auto;
    font-size: 11px; line-height: 1.4;
    white-space: pre-wrap; word-break: break-all;
    color: var(--dim);
  }

  /* Empty state */
  .empty { color: var(--dim); font-style: italic; font-size: 12px; }
</style>
</head>
<body>
<div class="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="status-group">
      <span class="status-dot off" id="statusDotRtsp"></span> RTSP
    </div>
    <label>Stream</label>
    <input id="rtspUrl" value="rtsp://recamera:recamera.1@192.168.10.158:8554/live0" class="rtsp-url" />
    <button id="videoBtn" class="secondary" onclick="toggleVideo()">Start Video</button>

    <div class="sep"></div>

    <div class="status-group">
      <span class="status-dot off" id="statusDotMqtt"></span> MQTT
    </div>
    <label>Host</label>
    <input id="mqttHost" value="localhost" />
    <label>WS</label>
    <input id="mqttPort" value="9001" class="narrow" />
    <label>Topic</label>
    <input id="mqttTopic" value="recamera/retail-vision/vision" class="topic" />
    <button id="connectBtn" onclick="toggleConnect()">Connect</button>
  </div>

  <div class="main">
    <!-- Video + Canvas -->
    <div class="canvas-wrap">
      <div class="video-container" id="videoContainer">
        <div class="no-video" id="noVideo">Click "Start Video" to connect RTSP stream</div>
        <img id="videoImg" style="display:none" />
        <canvas id="canvas" width="1280" height="720"></canvas>
      </div>
      <div class="canvas-stats">
        <span>FPS: <span class="val" id="statFps">--</span></span>
        <span>Infer: <span class="val" id="statInfer">--</span>ms</span>
        <span>Persons: <span class="val" id="statPersons">0</span></span>
        <span>Frame: <span class="val" id="statFrame">--</span></span>
        <span>MSG/s: <span class="val" id="statMsgRate">0</span></span>
      </div>
    </div>

    <!-- Side panel -->
    <div class="side">
      <!-- Zone metrics -->
      <div class="card">
        <h3>Zone Metrics</h3>
        <div class="metric-grid">
          <div class="metric"><span class="label">Occupancy</span><span class="value highlight" id="zOccupancy">0</span></div>
          <div class="metric"><span class="label">Peak</span><span class="value" id="zPeak">0</span></div>
          <div class="metric"><span class="label">Browsing</span><span class="value" id="zBrowsing">0</span></div>
          <div class="metric"><span class="label">Engaged</span><span class="value" id="zEngaged">0</span></div>
          <div class="metric"><span class="label">Assist</span><span class="value" id="zAssist">0</span></div>
          <div class="metric"><span class="label">Avg Velocity</span><span class="value" id="zVelocity">0</span></div>
          <div class="metric"><span class="label">Entry</span><span class="value" id="zEntry">0</span></div>
          <div class="metric"><span class="label">Exit</span><span class="value" id="zExit">0</span></div>
          <div class="metric"><span class="label">Avg Dwell</span><span class="value" id="zDwell">0s</span></div>
          <div class="metric"><span class="label">Avg Engage</span><span class="value" id="zEngage">0s</span></div>
        </div>
      </div>

      <!-- Person list -->
      <div class="card">
        <h3>Tracked Persons</h3>
        <div id="personList"><span class="empty">No persons detected</span></div>
      </div>

      <!-- Raw JSON -->
      <div class="card">
        <h3>Raw JSON</h3>
        <div class="json-panel" id="rawJson"><span class="empty">Waiting for data...</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const STATE_COLORS = {
  transient:  '#4a9eff',
  dwelling:   '#f5c842',
  engaged:    '#f5a623',
  assistance: '#f55050',
};

let mqttClient = null;
let mqttConnected = false;
let videoStreaming = false;
let msgCount = 0;
let lastMsgCountReset = Date.now();
let lastData = null;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const videoImg = document.getElementById('videoImg');
const noVideo = document.getElementById('noVideo');

// --- Video (MJPEG via server.py) ---
function toggleVideo() {
  if (videoStreaming) stopVideo();
  else startVideo();
}

function startVideo() {
  const rtspUrl = document.getElementById('rtspUrl').value;
  // server.py proxies RTSP → MJPEG at /stream?url=...
  const origin = window.location.origin;
  const mjpegUrl = `${origin}/stream?url=${encodeURIComponent(rtspUrl)}`;

  videoImg.src = mjpegUrl;
  videoImg.style.display = 'block';
  noVideo.style.display = 'none';
  videoStreaming = true;

  document.getElementById('statusDotRtsp').classList.replace('off', 'on');
  document.getElementById('videoBtn').textContent = 'Stop Video';
  document.getElementById('videoBtn').classList.add('disconnect');

  videoImg.onerror = () => {
    console.error('MJPEG stream error');
    document.getElementById('statusDotRtsp').classList.replace('on', 'off');
  };
  videoImg.onload = () => {
    // Resize canvas to match video dimensions
    if (videoImg.naturalWidth > 0) {
      canvas.width = videoImg.naturalWidth;
      canvas.height = videoImg.naturalHeight;
    }
  };
}

function stopVideo() {
  videoImg.src = '';
  videoImg.style.display = 'none';
  noVideo.style.display = 'flex';
  videoStreaming = false;

  document.getElementById('statusDotRtsp').classList.replace('on', 'off');
  document.getElementById('videoBtn').textContent = 'Start Video';
  document.getElementById('videoBtn').classList.remove('disconnect');
}

// --- MQTT ---
function toggleConnect() {
  if (mqttConnected) disconnectMqtt();
  else connectMqtt();
}

function connectMqtt() {
  const host = document.getElementById('mqttHost').value;
  const port = document.getElementById('mqttPort').value;
  const topic = document.getElementById('mqttTopic').value;

  const url = `ws://${host}:${port}`;
  mqttClient = mqtt.connect(url, { reconnectPeriod: 3000 });

  mqttClient.on('connect', () => {
    mqttConnected = true;
    document.getElementById('statusDotMqtt').classList.replace('off', 'on');
    document.getElementById('connectBtn').textContent = 'Disconnect';
    document.getElementById('connectBtn').classList.add('disconnect');
    mqttClient.subscribe(topic);
  });

  mqttClient.on('message', (t, msg) => {
    try {
      const data = JSON.parse(msg.toString());
      msgCount++;
      lastData = data;
      updateUI(data);
    } catch (e) { console.error('Parse error', e); }
  });

  mqttClient.on('close', () => {
    mqttConnected = false;
    document.getElementById('statusDotMqtt').classList.replace('on', 'off');
    document.getElementById('connectBtn').textContent = 'Connect';
    document.getElementById('connectBtn').classList.remove('disconnect');
  });

  mqttClient.on('error', (e) => console.error('MQTT error', e));
}

function disconnectMqtt() {
  if (mqttClient) { mqttClient.end(); mqttClient = null; }
  mqttConnected = false;
  document.getElementById('statusDotMqtt').classList.replace('on', 'off');
  document.getElementById('connectBtn').textContent = 'Connect';
  document.getElementById('connectBtn').classList.remove('disconnect');
}

// --- MSG rate ---
setInterval(() => {
  const now = Date.now();
  const elapsed = (now - lastMsgCountReset) / 1000;
  const rate = elapsed > 0 ? (msgCount / elapsed).toFixed(1) : '0';
  document.getElementById('statMsgRate').textContent = rate;
  msgCount = 0;
  lastMsgCountReset = now;
}, 2000);

// --- UI update ---
function updateUI(data) {
  // Stats bar
  document.getElementById('statFps').textContent = data.fps?.toFixed(1) ?? '--';
  document.getElementById('statInfer').textContent = data.inference_time_ms?.toFixed(0) ?? '--';
  document.getElementById('statPersons').textContent = data.persons?.length ?? 0;
  document.getElementById('statFrame').textContent = data.frame_id ?? '--';

  // Zone metrics
  const z = data.zone || {};
  document.getElementById('zOccupancy').textContent = z.occupancy_count ?? 0;
  document.getElementById('zPeak').textContent = z.peak_customer ?? 0;
  document.getElementById('zBrowsing').textContent = z.browsing_count ?? 0;
  document.getElementById('zEngaged').textContent = z.engaged_count ?? 0;
  document.getElementById('zAssist').textContent = z.assist_count ?? 0;
  document.getElementById('zVelocity').textContent = (z.avg_velocity ?? 0).toFixed(2) + ' m/s';
  document.getElementById('zEntry').textContent = z.entry_count ?? 0;
  document.getElementById('zExit').textContent = z.exit_count ?? 0;
  document.getElementById('zDwell').textContent = (z.avg_dwell_time ?? 0).toFixed(1) + 's';
  document.getElementById('zEngage').textContent = (z.avg_engagement_time ?? 0).toFixed(1) + 's';

  // Person list
  const listEl = document.getElementById('personList');
  const persons = data.persons || [];
  if (persons.length === 0) {
    listEl.innerHTML = '<span class="empty">No persons detected</span>';
  } else {
    listEl.innerHTML = persons.map(p => {
      const state = p.state || 'transient';
      const speed = p.velocity?.speed_m_s?.toFixed(2) ?? '0';
      const vx = p.velocity?.vx?.toFixed(3) ?? '0';
      const vy = p.velocity?.vy?.toFixed(3) ?? '0';
      const conf = (p.confidence * 100).toFixed(0);
      const dwell = p.dwell_duration?.toFixed(1) ?? '0';
      const b = p.bbox || {};
      return `<div class="person-item ${state}">
        <div class="person-header">
          <span class="id">#${p.track_id}</span>
          <span class="state state-${state}">${state}</span>
        </div>
        <div class="person-detail">
          <b>conf:</b> ${conf}%  <b>speed:</b> ${speed} m/s  <b>dwell:</b> ${dwell}s<br>
          <b>vel:</b> vx=${vx} vy=${vy}<br>
          <b>bbox:</b> x=${b.x} y=${b.y} w=${b.width} h=${b.height}
        </div>
      </div>`;
    }).join('');
  }

  // Raw JSON
  document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);

  // Canvas overlay
  drawOverlay(data);
}

// --- Canvas overlay rendering ---
function drawOverlay(data) {
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  // If no video, draw dark grid as background
  if (!videoStreaming) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, cw, ch);
    ctx.strokeStyle = '#1a1d27';
    ctx.lineWidth = 1;
    const gridSize = 80;
    for (let x = 0; x < cw; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke();
    }
    for (let y = 0; y < ch; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
    }
  }

  // Edge margin zone (15%)
  const mx = cw * 0.15, my = ch * 0.15;
  ctx.strokeStyle = videoStreaming ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.strokeRect(mx, my, cw - 2 * mx, ch - 2 * my);
  ctx.setLineDash([]);

  // Frame dimensions from payload (for scaling absolute coords to canvas)
  const frameW = data.frame_width || 1280;
  const frameH = data.frame_height || 720;
  const scaleX = cw / frameW;
  const scaleY = ch / frameH;

  const persons = data.persons || [];
  persons.forEach(p => {
    const b = p.bbox || {};
    const state = p.state || 'transient';
    const color = STATE_COLORS[state] || '#4a9eff';

    // bbox is absolute pixel coords (top-left x,y + width,height)
    const left = b.x * scaleX;
    const top = b.y * scaleY;
    const bw = b.width * scaleX;
    const bh = b.height * scaleY;
    const cx = left + bw / 2;
    const cy = top + bh / 2;

    // Fill
    ctx.fillStyle = color;
    ctx.globalAlpha = videoStreaming ? 0.15 : 0.1;
    ctx.fillRect(left, top, bw, bh);
    ctx.globalAlpha = 1.0;

    // Border
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(left, top, bw, bh);

    // Velocity arrow from center
    const vx = (p.velocity?.vx ?? 0) * cw;
    const vy = (p.velocity?.vy ?? 0) * ch;
    const arrowScale = 3;
    if (Math.abs(vx) > 1 || Math.abs(vy) > 1) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + vx * arrowScale, cy + vy * arrowScale);
      ctx.stroke();
      const angle = Math.atan2(vy, vx);
      const headLen = 8;
      ctx.beginPath();
      ctx.moveTo(cx + vx * arrowScale, cy + vy * arrowScale);
      ctx.lineTo(
        cx + vx * arrowScale - headLen * Math.cos(angle - 0.4),
        cy + vy * arrowScale - headLen * Math.sin(angle - 0.4)
      );
      ctx.moveTo(cx + vx * arrowScale, cy + vy * arrowScale);
      ctx.lineTo(
        cx + vx * arrowScale - headLen * Math.cos(angle + 0.4),
        cy + vy * arrowScale - headLen * Math.sin(angle + 0.4)
      );
      ctx.stroke();
    }

    // Label: #ID state speed
    const label = `#${p.track_id} ${state} ${(p.velocity?.speed_m_s ?? 0).toFixed(1)}m/s`;
    ctx.font = 'bold 13px SF Mono, Consolas, monospace';
    const tm = ctx.measureText(label);
    const lx = left;
    const ly = top - 6;
    // Label bg
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.fillRect(lx - 2, ly - 13, tm.width + 8, 16);
    ctx.globalAlpha = 1.0;
    // Label text
    ctx.fillStyle = '#111';
    ctx.fillText(label, lx + 2, ly);

    // Dwell bar under bbox
    const dwellMax = 20;
    const dwellPct = Math.min((p.dwell_duration ?? 0) / dwellMax, 1.0);
    if (dwellPct > 0.01) {
      const barY = top + bh + 4;
      const barW = bw * dwellPct;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(left, barY, bw, 3);
      ctx.fillStyle = color;
      ctx.fillRect(left, barY, barW, 3);
    }

    // Center dot
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Zone info top-right
  const z = data.zone || {};
  ctx.font = '12px SF Mono, Consolas, monospace';
  ctx.textAlign = 'right';
  // Text shadow for readability on video
  const lines = [
    `Occupancy: ${z.occupancy_count ?? 0}  Peak: ${z.peak_customer ?? 0}`,
    `Entry: ${z.entry_count ?? 0}  Exit: ${z.exit_count ?? 0}`,
  ];
  lines.forEach((line, i) => {
    const y = 20 + i * 16;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(line, cw - 9, y + 1);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(line, cw - 10, y);
  });
  ctx.textAlign = 'left';
}

// Initial draw
drawOverlay({ persons: [], zone: {} });
</script>
</body>
</html>
